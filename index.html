<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAI ChatKit Agent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #status {
            padding: 10px;
            background: #f0f0f0;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        #chat-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="status">Initializing ChatKit...</div>
    <div id="chat-container"></div>

    <!-- ChatKit JS SDK (removing async to ensure it's available) -->
    <script src="https://cdn.platform.openai.com/deployments/chatkit/chatkit.js"></script>

    <script>
        async function initChat() {
            const status = document.getElementById('status');
            console.log("Starting ChatKit initialization...");
            
            if (typeof OpenAI === 'undefined' || !OpenAI.ChatKit) {
                console.error("OpenAI ChatKit SDK not found!");
                status.innerText = "Error: ChatKit SDK failed to load.";
                return;
            }

            try {
                const chat = new OpenAI.ChatKit({
                    containerId: 'chat-container',
                    getClientSecret: async () => {
                        console.log("Fetching session from backend...");
                        try {
                            const response = await fetch('https://chatkit-backend-ruddy.vercel.app/api/session', {
                                method: 'POST'
                            });
                            const data = await response.json();
                            
                            if (data.error) {
                                console.error("Backend error:", data.error);
                                status.innerText = "Backend Error: " + (data.error.message || data.error);
                                return null;
                            }
                            
                            console.log("Session token received successfully.");
                            status.style.display = 'none'; // Hide status on success
                            return data.client_secret;
                        } catch (err) {
                            console.error("Failed to fetch session:", err);
                            status.innerText = "Network Error: Could not connect to backend.";
                            throw err;
                        }
                    }
                });
                console.log("ChatKit instance created.");
            } catch (err) {
                console.error("Initialization error:", err);
                status.innerText = "Init Error: " + err.message;
            }
        }

        // Initialize when the script is ready
        if (document.readyState === 'loading') {
            window.addEventListener('load', initChat);
        } else {
            initChat();
        }
    </script>
</body>
</html>
