<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAI ChatKit Agent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #status {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 10px;
            background: #f0f0f0;
            font-size: 12px;
            color: #666;
            text-align: center;
            z-index: 1000;
        }
        openai-chatkit {
            display: block;
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>
    <div id="status">Loading Agent...</div>
    
    <!-- Use the web component defined by the SDK -->
    <openai-chatkit id="chat-widget"></openai-chatkit>

    <script src="https://cdn.platform.openai.com/deployments/chatkit/chatkit.js"></script>

    <script>
        async function init() {
            const status = document.getElementById('status');
            const widget = document.getElementById('chat-widget');

            console.log("Initializing widget...");

            const options = {
                api: {
                    getClientSecret: async () => {
                        console.log("Fetching secret...");
                        try {
                            const res = await fetch('https://chatkit-backend-ruddy.vercel.app/api/session', { method: 'POST' });
                            const data = await res.json();
                            if (data.error) throw new Error(data.error.message || data.error);
                            
                            status.style.display = 'none';
                            return data.client_secret;
                        } catch (e) {
                            status.innerText = "Error: " + e.message;
                            console.error(e);
                        }
                    }
                }
            };

            // The SDK often exposes a setOptions method on the element
            if (widget.setOptions) {
                widget.setOptions(options);
            } else {
                // Fallback: Some versions use a property
                widget.options = options;
            }
        }

        // Wait for the custom element to be defined and the page to load
        customElements.whenDefined('openai-chatkit').then(init);
    </script>
</body>
</html>
